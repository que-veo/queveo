<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿QUÉ VEO? 🍿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            font-family: 'Poppins', sans-serif;
        }
        .titulo {
            text-shadow: 0 0 20px rgba(234, 179, 8, 0.5);
        }
        .peli-card {
            transition: all 0.3s ease;
        }
        .peli-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .buscador:focus {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.5);
        }
    </style>
</head>
<body class="p-4">
    <div class="container mx-auto max-w-6xl">
        
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1569597093636219" crossorigin="anonymous"></script>

        <header class="text-center mt-8 mb-12">
            <h1 class="titulo text-6xl md:text-8xl text-yellow-400 font-black mb-4">¿QUÉ VEO?</h1>
            <p class="text-gray-300 text-xl md:text-2xl">Encuentra la película perfecta 🍿</p>
        </header>

        <div class="bg-black/40 p-6 rounded-3xl shadow-2xl mb-10">
            <div class="flex flex-col md:flex-row gap-4">
                <input 
                    type="text" 
                    id="busqueda" 
                    placeholder="Escribe el nombre de la película..." 
                    class="buscador flex-1 bg-gray-900/70 border-2 border-gray-700 rounded-2xl px-6 py-4 text-xl text-white focus:outline-none focus:border-yellow-400 transition-all"
                >
                <button 
                    onclick="buscarPelicula()" 
                    class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-4 px-8 rounded-2xl text-xl transition-all transform hover:scale-105 uppercase"
                >
                    🔍 BUSCAR
                </button>
            </div>
        </div>

        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1569597093636219" crossorigin="anonymous"></script>

        <div id="resultados" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Las películas aparecerán aquí -->
        </div>

        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1569597093636219" crossorigin="anonymous"></script>

    </div>

    <script>
        // ESTA LLAVE SÍ FUNCIONA
        const API_KEY = 'a5c32199'; 
        const URL_BASE = 'https://www.omdbapi.com/?apikey=' + API_KEY + '&type=movie&';

        async function buscarPelicula() {
            const busqueda = document.getElementById('busqueda').value;
            const resultadosDiv = document.getElementById('resultados');
            
            if(!busqueda) return;

            resultadosDiv.innerHTML = '<p class="text-center text-2xl col-span-full">Buscando... 🤖🍿</p>';

            try {
                const respuesta = await fetch(URL_BASE + 's=' + busqueda);
                const datos = await respuesta.json();

                if(datos.Response === "True") {
                    resultadosDiv.innerHTML = "";
                    datos.Search.forEach(peli => {
                        mostrarPelicula(peli);
                    });
                } else {
                    resultadosDiv.innerHTML = '<p class="text-center text-2xl text-red-400 col-span-full">No se encontraron resultados 😢</p>';
                }
            } catch(error) {
                resultadosDiv.innerHTML = '<p class="text-center text-2xl text-red-400 col-span-full">Error de conexión 🛑</p>';
            }
        }

        function mostrarPelicula(peli) {
            const resultadosDiv = document.getElementById('resultados');
            const imagen = peli.Poster !== "N/A" ? peli.Poster : 'https://via.placeholder.com/300x450?text=SIN+IMAGEN';

            const tarjeta = document.createElement('div');
            tarjeta.className = "peli-card rounded-2xl overflow-hidden shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1";
            tarjeta.innerHTML = `
                <img src="${imagen}" alt="${peli.Title}" class="w-full h-80 object-cover">
                <div class="p-5">
                    <h3 class="titulo text-3xl text-white mb-2">${peli.Title}</h3>
                    <p class="text-gray-400 text-lg">📅 Año: ${peli.Year}</p>
                </div>
            `;
            resultadosDiv.appendChild(tarjeta);
        }

        document.getElementById('busqueda').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') buscarPelicula();
        });
    </script>
</body>
      </html>
